# Example YAML configuration for register_apps
# This replaces the long bash script with a clean, maintainable YAML file

# Global defaults - can be overridden per app
defaults:
  bindir: /usersoftware/papaemme/isabl/bin
  optdir: /usersoftware/papaemme/isabl/local
  container_runtime: singularity  # or docker
  singularity_path: /usr/bin/singularity
  docker_path: docker
  volumes:
    - /data1:/data1
  tmpvar: $TMP_DIR
  environment: production
  force: true

# List of apps to install
apps:
  # ============================================
  # CONTAINER APPS
  # ============================================
  
  - type: container
    target: mosdepth
    command: mosdepth
    image_repository: mosdepth
    image_version: 0.2.5
    image_url: quay.io/biocontainers/mosdepth:0.2.5--hb763d49_0

  - type: container
    target: fusioncatcher_v1.3.0
    command: /opt/fusioncatcher/v1.30/bin/fusioncatcher.py
    image_user: papaemmelab
    image_repository: docker-fusioncatcher
    image_version: v1.3.0

  - type: container
    target: STAR-Fusion
    command: STAR-Fusion
    image_repository: docker-starfusion
    image_version: v1.3.1

  - type: container
    target: fuseq
    command: FuSeq
    image_repository: docker-fuseq
    image_version: v1.1.1

  - type: container
    target: click_mergefusions_v1.0.7
    command: click_mergefusions
    image_repository: click_mergefusions
    image_version: v1.0.7

  - type: container
    target: HemeAutotator
    command: Rscript
    image_url: docker://papaemmelab/docker-heme-autotator:v0.2.0
    image_repository: papaemmelab
    image_version: v0.2.0

  - type: container
    target: telseq_v0.0.2
    command: telseq
    image_repository: mosdepth
    image_version: 0.2.5
