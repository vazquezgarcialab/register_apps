name: Run register_apps tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.9
        run: uv python install 3.9

      - name: Create virtual environment
        run: uv venv --python 3.9

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[test]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -v --cov=register_apps --cov-report=term-missing --cov-report=xml

      - name: Run linting
        run: |
          source .venv/bin/activate
          pylint register_apps || true  # Don't fail on linting errors
          pydocstyle register_apps || true  # Don't fail on docstyle errors

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
