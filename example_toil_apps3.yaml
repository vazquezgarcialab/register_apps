# Example YAML configuration for register_apps
# This replaces the long bash script with a clean, maintainable YAML file

# Global defaults - can be overridden per app

defaults:
  bindir: /isabl/bin
  optdir: /isabl/local
  container_runtime: singularity
  docker_path: docker
  image_user: papaemmelab
  volumes:
    - /isabl:/isabl
    - /scratch:/scratch
    - /data_input:/data_input
    - /data_output:/data_output
  tmpvar: $TMP_DIR
  environment: development
  force: true
  verify: "--version"
  verify_after_install: false

# List of apps to install
apps:

  # ============================================
  # TOIL APPS
  # ============================================

  - type: toil
    pypi_name: toil_mergevcfs
    pypi_version: v0.12.0
    image_url: docker://papaemmelab/toil_mergevcfs:v0.12.0
    github_user: papaemmelab
    python: /isabl/local/pyenv/versions/3.9.25/bin/python3
    container: singulartiy
    no_deps: true
    pre_install:
      - "cython<3"
      - "numpy<2"
      - "pandas<2"
      - "pysam>=0.19,<1"
      #- "cython"
      #- "setuptools<53"
      #- "pip==20.3.4"
      #- "wheel"
      #- "numpy<2"
      - git+https://github.com/papaemmelab/toil@custom-5.5.1#eggs=toil
      - git+https://github.com/papaemmelab/toil_container@v2.0.3#eggs=toil_container
  
  - type: toil
    pypi_name: toil_mergevcfs
    pypi_version: v0.13.2
    image_url: docker://papaemmelab/toil_mergevcfs:v0.13.2
    github_user: papaemmelab
    python: /isabl/local/pyenv/versions/3.9.25/bin/python3
    container: singularity
    pre_install:
      - git+https://github.com/papaemmelab/toil@custom-5.5.1#eggs=toil
      - git+https://github.com/papaemmelab/toil_container@v2.0.3#eggs=toil_container
    no_build_isolation: true
