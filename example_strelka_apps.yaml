# Example YAML configuration for register_apps
# This replaces the long bash script with a clean, maintainable YAML file

# Global defaults - can be overridden per app

defaults:
  bindir: /isabl/bin
  optdir: /isabl/local
  container_runtime: singularity
  docker_path: docker
  image_user: papaemmelab
  volumes:
    - /isabl:/isabl
    - /scratch:/scratch
    - /data_input:/data_input
    - /data_output:/data_output
  tmpvar: $TMP_DIR
  environment: development
  force: true
  verify: "--version"
  verify_after_install: false

# List of apps to install
apps:
  # ============================================
  # CONTAINER APPS
  # ============================================


  # ============================================
  # TOIL APPS
  # ============================================
  - type: toil
    pypi_name: toil_battenberg
    pypi_version: v1.0.7
    image_url: docker://papaemmelab/toil_battenberg:v1.0.7
    github_user: papaemmelab
    python: python
    #python: /isabl/local/pyenv/versions/2.7.15/bin/python2
    container_runtime: singularity
    container: singularity
    pre_install:
      - git+https://github.com/papaemmelab/toil@custom-3.25.0#eggs=toil
      - git+https://github.com/papaemmelab/toil_container@v1.1.8#eggs=toil_container

